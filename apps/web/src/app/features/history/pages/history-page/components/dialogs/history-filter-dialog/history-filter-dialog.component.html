<h2 mat-dialog-title>Filter Sessions</h2>

<mat-dialog-content class="!pt-4">
  <form [formGroup]="filterForm" class="space-y-4 p-1">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Training plan</mat-label>
      <mat-select formControlName="selectedPlanId">
        @for (plan of availablePlans; track plan.id) {
          <mat-option [value]="plan.id">{{ plan.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (data.mode === 'calendar') {
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Month</mat-label>
        <input
          matInput
          readonly
          formControlName="month"
          [matDatepicker]="monthPicker"
          data-cy="history-filter-dialog-month-input">
        <mat-datepicker-toggle matIconSuffix [for]="monthPicker"></mat-datepicker-toggle>
        <mat-datepicker
          #monthPicker
          startView="multi-year"
          (monthSelected)="onMonthSelected($event, monthPicker)">
        </mat-datepicker>
      </mat-form-field>
    }
    @if (data.mode === 'list') {
      <txg-date-range-field
        [value]="dateRange"
        (valueChange)="onDateRangeChanged($event)"
        (validityChange)="onDateRangeValidityChanged($event)">
      </txg-date-range-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Sessions per page</mat-label>
        <mat-select formControlName="pageSize">
          @for (size of pageSizeOptions; track size) {
            <mat-option [value]="size">{{ size }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancelled()" type="button">
    Cancel
  </button>
  <button mat-flat-button (click)="onFiltersApplied()" type="submit" [disabled]="filterForm.invalid || !dateRangeValid" data-cy="history-filter-dialog-apply-filters-button">
    Apply Filters
  </button>
</mat-dialog-actions>
