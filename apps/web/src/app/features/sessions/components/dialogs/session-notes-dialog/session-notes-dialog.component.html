<h2 mat-dialog-title class="text-xl font-semibold" data-cy="session-notes-dialog-title">Notes</h2>

<mat-dialog-content [formGroup]="notesForm" class="!pt-4" data-cy="session-notes-dialog-content">
  <mat-form-field appearance="outline" class="w-full mb-3">
    <mat-label>Session notes</mat-label>
    <textarea
      matInput
      formControlName="sessionNotes"
      rows="4"
      [maxlength]="maxLength"
      placeholder="How did this workout go?"
      data-cy="session-notes-dialog-session-input"></textarea>
    <mat-hint align="end">{{ notesForm.get('sessionNotes')?.value?.length ?? 0 }}/{{ maxLength }}</mat-hint>
  </mat-form-field>

  @if (showPlanNotes) {
    <mat-form-field appearance="outline" class="w-full mb-3">
      <mat-label>Plan notes</mat-label>
      <textarea
        matInput
        formControlName="planNotes"
        rows="4"
        [maxlength]="maxLength"
        placeholder="Anything to remember across sessions of this plan?"
        data-cy="session-notes-dialog-plan-input"></textarea>
      <mat-hint align="end">{{ notesForm.get('planNotes')?.value?.length ?? 0 }}/{{ maxLength }}</mat-hint>
    </mat-form-field>
  }

  <div class="flex flex-col flex-grow gap-2">
    <button mat-flat-button color="primary" (click)="onSave()" data-cy="session-notes-dialog-save-button">
      <span>Save</span>
    </button>
  </div>
</mat-dialog-content>
