<mat-card>
  <mat-card-header>
    <mat-card-title class="!font-medium !text-primary">Account Settings</mat-card-title>
  </mat-card-header>
  <mat-card-content class="mt-7">
    <div class="flex flex-col space-y-2">
      @if (account && account.googleLinked !== null) {
        @if (account.googleLinked) {
          <button
            mat-raised-button
            [disabled]="account.identityCount <= 1"
            (click)="onGoogleDisconnected()"
            data-cy="settings-disconnect-google-button">
            <txg-google-icon></txg-google-icon>
            Disconnect Google account
          </button>
        } @else {
          <button mat-raised-button (click)="onGoogleConnected()" data-cy="settings-connect-google-button">
            <txg-google-icon></txg-google-icon>
            Connect Google account
          </button>
        }
      }
      <button mat-raised-button (click)="onPasswordChanged()" data-cy="settings-change-password-button">Change Password</button>
      <button mat-raised-button (click)="onSignedOut()" data-cy="settings-sign-out-button">Sign Out</button>
    </div>
  </mat-card-content>
</mat-card>
