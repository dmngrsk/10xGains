packages:
  - 'apps/*'
  - 'packages/*'
  - 'cypress'

# Postinstall build scripts are blocked by default since pnpm 10; the packages below
# are explicitly trusted (native binaries and CLI downloads required by the toolchain).
allowBuilds:
  '@parcel/watcher': true
  azure-functions-core-tools: true
  cypress: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  supabase: true
  unrs-resolver: true

# Security overrides for vulnerable transitive dependencies (pnpm audit).
# Note: @angular/* advisories (GHSA-rgjc-h3x7-9mwg et al.) have no fix in the 19.x
# line; they require an upgrade to Angular >=20.3.25.
overrides:
  '@babel/core@<7.29.1': ^7.29.1
  '@sigstore/core@<3.2.1': ^3.2.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  http-proxy-middleware@>=3.0.0 <3.0.7: ^3.0.7
  js-yaml@<3.15.0: ^3.15.0
  koa@<2.16.4: ^2.16.4
  minimatch@>=9.0.0 <9.0.7: ^9.0.7
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  piscina@<4.9.3: ^4.9.3
  qs@>=6.11.1 <6.15.2: ^6.15.2
  serialize-javascript@<7.0.5: ^7.0.5
  sigstore@<4.1.1: ^4.1.1
  tar@<7.5.16: ^7.5.16
  uuid@<11.1.1: ^11.1.1
  vite@<=6.4.2: ^6.4.3
  webpack-dev-server@<5.2.5: ^5.2.5
  webpack@>=5.49.0 <5.104.1: ^5.104.1
  ws@>=8.0.0 <8.21.0: ^8.21.0
