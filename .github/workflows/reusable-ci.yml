name: Reusable Continuous Integration Workflow

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      build_name:
        type: string
      build_sha:
        type: string
      build_tag:
        type: string

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment value
        if: inputs.environment != 'staging' && inputs.environment != 'production'
        run: |
          echo "Error: environment must be either 'staging' or 'production'"
          exit 1

      - name: Set git default branch
        run: |
          git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: |
          pnpm install --frozen-lockfile

      - name: Run linter
        run: |
          pnpm lint

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Set git default branch
        run: |
          git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: |
          pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: |
          pnpm test:coverage

      - name: Upload unit test coverage
        if: inputs.environment == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage
          path: |
            apps/web/coverage/
            apps/api/coverage/
          retention-days: 7

  build-api:
    name: Build API app
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Set git default branch
        run: |
          git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: |
          pnpm install --frozen-lockfile

      - name: Typecheck API app
        run: |
          pnpm --filter @txg/api typecheck

      - name: Build API app deployment package
        run: |
          pnpm --filter @txg/api build:deploy

      - name: Upload build artifacts for staging
        if: inputs.environment == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: dist-api-staging
          path: apps/api/deploy/
          retention-days: 7

      - name: Upload build artifacts for production
        if: inputs.environment == 'production'
        uses: actions/upload-artifact@v7
        with:
          name: dist-api-production
          path: apps/api/deploy/
          retention-days: 30

  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [lint, test]
    steps:
      - name: Set git default branch
        run: |
          git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: |
          pnpm install --frozen-lockfile

      - name: Generate environment file
        run: |
          TEMPLATE_FILE="apps/web/src/environments/environment.ts"
          OUTPUT_FILE="apps/web/src/environments/environment.${{ inputs.environment }}.ts"

          cp "$TEMPLATE_FILE" "$OUTPUT_FILE"

          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "Setting 'production' flag to true for production environment."
            sed -i 's/production: false,/production: true,/' "$OUTPUT_FILE"
          fi

          sed -i \
            -e "s|enableServiceWorker: false,|enableServiceWorker: true,|g" \
            -e "s|__BUILD_NAME__|${{ inputs.build_name }}|g" \
            -e "s|__BUILD_SHA__|${{ inputs.build_sha }}|g" \
            -e "s|__BUILD_TAG__|${{ inputs.build_tag }}|g" \
            -e "s|__API_URL__|${{ vars.API_URL }}|g" \
            -e "s|__SUPABASE_URL__|${{ vars.SUPABASE_URL }}|g" \
            -e "s|__SUPABASE_PUBLISHABLE_KEY__|${{ secrets.SUPABASE_PUBLISHABLE_KEY }}|g" \
            -e "s|__VAPID_PUBLIC_KEY__|${{ vars.VAPID_PUBLIC_KEY }}|g" \
            "$OUTPUT_FILE"

          echo "Generated ${OUTPUT_FILE}:"
          echo ""
          cat "${OUTPUT_FILE}"

      - name: Generate webmanifest file
        run: |
          WEBMANIFEST_FILE="apps/web/src/manifest.webmanifest"

          jq \
            --arg name "${{ vars.APP_WEBMANIFEST_NAME }}" \
            --arg short_name "${{ vars.APP_WEBMANIFEST_SHORT_NAME }}" \
            '
              (if $name != "" then .name = $name else . end) |
              (if $short_name != "" then .short_name = $short_name else . end)
            ' \
            "$WEBMANIFEST_FILE" > "${WEBMANIFEST_FILE}.tmp"

          mv "${WEBMANIFEST_FILE}.tmp" "$WEBMANIFEST_FILE"

          echo "Generated ${WEBMANIFEST_FILE}:"
          echo ""
          cat "${WEBMANIFEST_FILE}"

      - name: Build web app
        run: |
          pnpm build:${{ inputs.environment }}

      - name: Upload build artifacts for staging
        if: inputs.environment == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: dist-web-staging
          path: apps/web/dist/
          retention-days: 7

      - name: Upload build artifacts for production
        if: inputs.environment == 'production'
        uses: actions/upload-artifact@v7
        with:
          name: dist-web-production
          path: apps/web/dist/
          retention-days: 30
