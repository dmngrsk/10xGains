name: Reusable Continuous Deployment Workflow

on:
  workflow_call:
    inputs:
      defer:
        type: boolean
        default: true
        description: 'Whether to defer deployment to the environment'
      environment:
        type: string
        required: true
        description: 'Environment to deploy to (staging or production)'
      e2e_scope:
        type: string
        required: true
        description: 'Scope of E2E tests to run (full or smoke)'

jobs:
  defer:
    name: Defer deployment
    runs-on: ubuntu-latest
    if: inputs.defer
    environment:
      name: ${{ inputs.environment }}-cd
    steps:
      - name: Wait for approval
        run: |
          echo "Approval received, deploying to ${{ inputs.environment }} environment..."

  database:
    name: Deploy database migrations to Supabase
    runs-on: ubuntu-latest
    needs: [defer]
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate environment value
        if: inputs.environment != 'staging' && inputs.environment != 'production'
        run: |
          echo "Error: environment must be either 'staging' or 'production'"
          exit 1

      - name: Validate e2e_scope value
        if: inputs.e2e_scope != 'full' && inputs.e2e_scope != 'smoke'
        run: |
          echo "Error: e2e_scope must be either 'full' or 'smoke'"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned to the version in package.json.
          version: 2.30.4

      - name: Deploy database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_ID }}
          supabase db push
          supabase db test --linked

  backend-api:
    name: Deploy API app to Azure Functions
    needs: [database]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download API app artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-api-${{ inputs.environment }}
          path: apps/api/deploy/

      - name: Log in to Azure via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: apps/api/deploy
          remote-build: true
          sku: flexconsumption

  frontend:
    name: Deploy web app to Azure Static Web App
    needs: [backend-api]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install Azure SWA CLI
        run: |
          npm install -g @azure/static-web-apps-cli

      - name: Download web app artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-web-${{ inputs.environment }}
          path: apps/web/dist/

      - name: Log in to Azure via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve deployment token
        # The SWA CLI cannot authenticate via OIDC federated credentials directly,
        # so fetch the deployment token at deploy time instead of storing it as a
        # long-lived GitHub secret.
        id: swa
        run: |
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name ${{ vars.AZURE_STATIC_WEB_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$SWA_TOKEN"
          echo "token=$SWA_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Azure Static Web App using Azure SWA CLI
        # The specified 'production' environment is in the context of the Azure SWA resource.
        # Note: The standard Azure/static-web-apps-deploy action forces PR-number-based preview
        # environments on pull_request events, ignoring deployment_environment. Staging deploys
        # run from PR-triggered pipelines and must target the SWA production environment, so we
        # deploy directly to the resource via the SWA CLI instead.
        run: |
          swa deploy ./apps/web/dist/browser \
            --app-name ${{ vars.AZURE_STATIC_WEB_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --env production \
            --deployment-token ${{ steps.swa.outputs.token }}

  e2e:
    name: Run E2E Tests
    needs: [frontend]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run smoke E2E tests
        if: inputs.e2e_scope == 'smoke'
        env:
          APP_CANARY_USER_EMAIL: ${{ secrets.APP_CANARY_USER_EMAIL }}
          APP_CANARY_USER_PASSWORD: ${{ secrets.APP_CANARY_USER_PASSWORD }}
          CYPRESS_BASE_URL: ${{ vars.APP_URL }}
          CYPRESS_DEFAULT_COMMAND_TIMEOUT: ${{ vars.CYPRESS_DEFAULT_COMMAND_TIMEOUT }}
          CYPRESS_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          pnpm e2e:smoke

      - name: Run full E2E tests
        if: inputs.e2e_scope == 'full'
        env:
          APP_CANARY_USER_EMAIL: ${{ secrets.APP_CANARY_USER_EMAIL }}
          APP_CANARY_USER_PASSWORD: ${{ secrets.APP_CANARY_USER_PASSWORD }}
          CYPRESS_BASE_URL: ${{ vars.APP_URL }}
          CYPRESS_DEFAULT_COMMAND_TIMEOUT: ${{ vars.CYPRESS_DEFAULT_COMMAND_TIMEOUT }}
          CYPRESS_ENVIRONMENT: ${{ inputs.environment }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pnpm e2e:run

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ inputs.environment }}
          path: |
            cypress/videos/
            cypress/screenshots/
            cypress/results/
          retention-days: 7
